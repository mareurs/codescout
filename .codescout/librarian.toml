# Per-project classifier overrides for the librarian MCP.
# Layered above the global workspace.toml rules and built-in defaults.
# First-match-wins, so rules ordered most-specific first.

# Phase reviews / postmortems — dated review snapshots.
[[rule]]
glob = "docs/reviews/**/*.md"
kind = "memory"
time_scope = "dated_snapshot"

# Per-agent compatibility/usage notes.
[[rule]]
glob = "docs/agents/*.md"
kind = "doc"

# Long-running cross-cutting trackers shipped under superpowers/.
[[rule]]
glob = "docs/superpowers/trackers/*.md"
kind = "tracker"
status = "active"

# Archived bug/issue logs preserved for posterity.
[[rule]]
glob = "docs/archive/**/*.md"
kind = "memory"

# Top-level project docs we ship for users (uppercase convention).
[[rule]]
glob = "docs/FEATURES.md"
kind = "doc"

[[rule]]
glob = "docs/PROGRESSIVE_DISCOVERABILITY.md"
kind = "doc"

[[rule]]
glob = "docs/RELEASE-TODO.md"
kind = "tracker"
status = "active"

# Research/validation memos — long-lived reference notes.
[[rule]]
glob = "docs/research-*.md"
kind = "memory"

# Crate-level credits files.
[[rule]]
glob = "crates/*/CREDITS.md"
kind = "doc"

# codescout-owned markdown shipped inside the source tree: prompt guides
# (get_guide content), embedded render-prompt templates, src READMEs. These
# are produced/owned by codescout itself — tag them "codescout" so they are
# distinguishable from authored project docs, and rescue the template files
# under src/**/tools/** that otherwise fall through to kind=unknown.
[[rule]]
glob = "src/**/*.md"
kind = "doc"
tags = ["codescout"]

[[rule]]
glob = "crates/*/src/**/*.md"
kind = "doc"
tags = ["codescout"]
