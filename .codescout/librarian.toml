# Per-project classifier overrides for the librarian MCP.
# Layered above the global workspace.toml rules and built-in defaults.
# First-match-wins, so rules ordered most-specific first.

# Phase reviews / postmortems — dated review snapshots.
[[rule]]
glob = "code-explorer/docs/reviews/**/*.md"
kind = "memory"
time_scope = "dated_snapshot"

# Per-agent compatibility/usage notes.
[[rule]]
glob = "code-explorer/docs/agents/*.md"
kind = "doc"

# Long-running cross-cutting trackers shipped under superpowers/.
[[rule]]
glob = "code-explorer/docs/superpowers/trackers/*.md"
kind = "tracker"
status = "active"

# Archived bug/issue logs preserved for posterity.
[[rule]]
glob = "code-explorer/docs/archive/**/*.md"
kind = "memory"

# Top-level project docs we ship for users (uppercase convention).
[[rule]]
glob = "code-explorer/docs/FEATURES.md"
kind = "doc"

[[rule]]
glob = "code-explorer/docs/PROGRESSIVE_DISCOVERABILITY.md"
kind = "doc"

[[rule]]
glob = "code-explorer/docs/RELEASE-TODO.md"
kind = "tracker"
status = "active"

# Research/validation memos — long-lived reference notes.
[[rule]]
glob = "code-explorer/docs/research-*.md"
kind = "memory"

# Crate-level credits files.
[[rule]]
glob = "code-explorer/crates/*/CREDITS.md"
kind = "doc"
