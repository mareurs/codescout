name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings

  test:
    name: Test (${{ matrix.os }} / ${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Each entry combines with every os. Windows excludes the
        # `local-embed`-bearing rows below — `ort-sys` does not ship
        # `x86_64-pc-windows-gnu` prebuilts, and the `default` feature set
        # also pulls in `local-embed`. Tracked in
        # docs/trackers/windows-compat-2026-04.md (W11).
        include:
          - name: default
            flags: ""
          - name: local-embed
            flags: "--features local-embed --no-default-features"
          - name: no-features
            flags: "--no-default-features"
          - os: windows-latest
            name: windows-baseline
            flags: "--no-default-features --features remote-embed,http,dashboard"
        exclude:
          - os: windows-latest
            name: default
          - os: windows-latest
            name: local-embed
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.name }}
      - run: cargo test ${{ matrix.flags }}

  tool-docs-sync:
    name: Tool Docs Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all tools are documented
        run: |
          grep -A1 'fn name(&self)' src/tools/*.rs | grep '"' | sed 's/.*"\(.*\)"/\1/' | sort > /tmp/code-tools.txt
          grep -roh '## `[a-z_]*`' docs/manual/src/tools/ | sed 's/## `\(.*\)`/\1/' | sort -u > /tmp/doc-tools.txt
          diff /tmp/code-tools.txt /tmp/doc-tools.txt || { echo "::error::Tool docs out of sync! Update docs/manual/src/tools/ to match src/tools/"; exit 1; }

  msrv:
    name: MSRV (1.75)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.75"
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo check
