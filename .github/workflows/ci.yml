name: CI

on:
  push:
    branches: [master, experiments]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: rui314/setup-mold@v1
      - uses: mozilla-actions/sccache-action@v0.0.7
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings

  test:
    name: Test (${{ matrix.os }} / ${{ matrix.config.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        config:
          - name: default
            flags: ""
          - name: local-embed
            flags: "--features local-embed --no-default-features"
          - name: no-features
            flags: "--no-default-features"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-analyzer
      - if: runner.os == 'Linux'
        uses: rui314/setup-mold@v1
      - uses: mozilla-actions/sccache-action@v0.0.7
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.config.name }}
      # Tests with the librarian feature on (default + local-embed configs)
      # construct CodeScoutServer instances which try to build_tool_context.
      # That call requires a librarian workspace file; seed an empty one so
      # the relevant tools register on fresh CI runners. v6 catalog tolerates
      # zero roots. unix uses XDG_CONFIG_HOME/HOME; Windows uses APPDATA.
      - name: Seed empty librarian workspace
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            mkdir -p "$APPDATA/librarian"
            touch "$APPDATA/librarian/workspace.toml"
          else
            mkdir -p "$HOME/.config/librarian"
            touch "$HOME/.config/librarian/workspace.toml"
          fi
      - run: cargo test ${{ matrix.config.flags }}

  tool-docs-sync:
    name: Tool Docs Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all tools are documented
        # Informational only: surfaces drift between src/tools/**/*.rs and
        # docs/manual/src/tools/ but does not fail the build. The current
        # diff is ~20 tools added/renamed/removed since the manual was last
        # refreshed (edit_section→edit_markdown, *_symbol consolidated into
        # edit_code, new tools call_graph/get_guide/get_usage_stats/index*/
        # library/list_*/memory CRUD). Manual refresh is its own engagement
        # — see docs/issues/2026-05-24-tool-docs-manual-drift.md.
        # Recursive grep (vs the prior non-recursive *.rs); test files
        # excluded. Diff is printed; exit code 0 regardless.
        run: |
          grep -rA1 'fn name(&self)' src/tools/ --include='*.rs' --exclude-dir=tests \
            | grep -E '^\s*"[a-z_]+"' \
            | sed 's/.*"\(.*\)".*/\1/' \
            | sort -u > /tmp/code-tools.txt
          grep -roh '## `[a-z_]*`' docs/manual/src/tools/ | sed 's/## `\(.*\)`/\1/' | sort -u > /tmp/doc-tools.txt
          if ! diff -u /tmp/code-tools.txt /tmp/doc-tools.txt; then
            echo "::warning::Tool docs out of sync — see docs/issues/2026-05-24-tool-docs-manual-drift.md"
          fi

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
      - uses: rui314/setup-mold@v1
      - uses: mozilla-actions/sccache-action@v0.0.7
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo check

  audit-doc-refs:
    name: Audit Doc Refs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
      - uses: mozilla-actions/sccache-action@v0.0.7
      - uses: Swatinem/rust-cache@v2
        with:
          key: audit-doc-refs
      - run: cargo build --release --bin codescout
      # The audit hits `build_tool_context` which requires a librarian
      # workspace file. On a fresh runner that file doesn't exist; seed
      # an empty one (v6 catalog tolerates zero roots).
      - name: Seed empty librarian workspace
        run: |
          mkdir -p "$HOME/.config/librarian"
          touch "$HOME/.config/librarian/workspace.toml"
      # `--fail-on never` keeps the gate informational while
      # docs/adrs/2026-05-13-semantic-anchors-qdrant-payload.md still
      # references a since-refactored path (1 known hi-sev as of
      # 2026-05-24). Flip to `--fail-on high` once that ADR is reconciled
      # — see H-5 in docs/trackers/codescout-usage-hookify.md.
      - name: Audit markdown for stale code references
        run: ./target/release/codescout audit-doc-refs --no-emit-tracker --fail-on never --json --project .
