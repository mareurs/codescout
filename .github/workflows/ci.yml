name: CI

on:
  push:
    branches: [master, experiments]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.7
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings

  test:
    name: Test (${{ matrix.os }} / ${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - name: default
            flags: ""
          - name: local-embed
            flags: "--features local-embed --no-default-features"
          - name: no-features
            flags: "--no-default-features"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.7
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.name }}
      - run: cargo test ${{ matrix.flags }}

  tool-docs-sync:
    name: Tool Docs Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all tools are documented
        run: |
          grep -A1 'fn name(&self)' src/tools/*.rs | grep '"' | sed 's/.*"\(.*\)"/\1/' | sort > /tmp/code-tools.txt
          grep -roh '## `[a-z_]*`' docs/manual/src/tools/ | sed 's/## `\(.*\)`/\1/' | sort -u > /tmp/doc-tools.txt
          diff /tmp/code-tools.txt /tmp/doc-tools.txt || { echo "::error::Tool docs out of sync! Update docs/manual/src/tools/ to match src/tools/"; exit 1; }

  msrv:
    name: MSRV (1.82)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.82"
      - uses: mozilla-actions/sccache-action@v0.0.7
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo check

  audit-doc-refs:
    name: Audit Doc Refs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.7
      - uses: Swatinem/rust-cache@v2
        with:
          key: audit-doc-refs
      - run: cargo build --release --bin codescout
      # `--fail-on never` keeps the gate informational while
      # docs/adrs/2026-05-13-semantic-anchors-qdrant-payload.md still
      # references a since-refactored path (1 known hi-sev as of
      # 2026-05-24). Flip to `--fail-on high` once that ADR is reconciled
      # — see H-5 in docs/trackers/codescout-usage-hookify.md.
      - name: Audit markdown for stale code references
        run: ./target/release/codescout audit-doc-refs --no-emit-tracker --fail-on never --json --project .
